name: Release

on:
  push:
    tags:
      - 'dragent-v*'
      - 'drhub-v*'
      - 'drmachine-v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release ${{ github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse tag
        id: parse
        run: |
          TAG="${GITHUB_REF_NAME}"
          NAME="${TAG#dr}"
          NAME="${NAME%-v*}"
          VERSION="${TAG##*-v}"
          # PyPI distribution name is drhub, but the source lives in
          # packages/cluster/ — keep the directory layout stable and
          # map the published name here instead of renaming the dir.
          case "${NAME}" in
            hub) PKG="cluster" ;;
            *)   PKG="${NAME}" ;;
          esac
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "package=${PKG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Tag: ${TAG} -> name=${NAME}, package=${PKG}, version=${VERSION}"

      - name: Verify pyproject version matches tag
        working-directory: packages/${{ steps.parse.outputs.package }}
        run: |
          PYPROJECT_VERSION=$(grep -E '^version = ' pyproject.toml | head -n1 | sed -E 's/version = "([^"]+)".*/\1/')
          if [ "$PYPROJECT_VERSION" != "${{ steps.parse.outputs.version }}" ]; then
            echo "::error::Tag version ${{ steps.parse.outputs.version }} does not match pyproject.toml version ${PYPROJECT_VERSION}"
            exit 1
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Build sdist + wheel
        run: |
          rm -rf dist/
          # uv writes build artifacts to the workspace root `dist/`
          # regardless of the directory `uv build` is invoked from, so
          # run from repo root and select the package by name. This
          # also keeps the per-package dist isolated to just this
          # tag's artifacts.
          uv build --package "dr${{ steps.parse.outputs.name }}"

      - name: Resolve previous tag for same package
        id: prev
        run: |
          NAME="${{ steps.parse.outputs.name }}"
          CURRENT="${GITHUB_REF_NAME}"
          PREV=$(git tag --list "dr${NAME}-v*" --sort=-version:refname \
            | grep -vx "${CURRENT}" \
            | head -n1 || true)
          echo "tag=${PREV}" >> "$GITHUB_OUTPUT"
          if [ -n "${PREV}" ]; then
            echo "Previous dr${NAME} tag: ${PREV}"
          else
            echo "No previous dr${NAME} tag found - this is the first release for the package."
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NAME="${{ steps.parse.outputs.name }}"
          VERSION="${{ steps.parse.outputs.version }}"
          PREV_TAG="${{ steps.prev.outputs.tag }}"
          ARGS=(
            "${GITHUB_REF_NAME}"
            --title "dr${NAME} v${VERSION}"
            --generate-notes
          )
          if [ -n "${PREV_TAG}" ]; then
            ARGS+=(--notes-start-tag "${PREV_TAG}")
          fi
          gh release create "${ARGS[@]}" dist/dr${NAME}-${VERSION}*
