name: Release

on:
  push:
    tags:
      - 'anygarden-v*'
      - 'anygarden-machine-v*'
      - 'anygarden-agent-v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release ${{ github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse tag
        id: parse
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Format: anygarden-v<ver>, anygarden-machine-v<ver>, anygarden-agent-v<ver>
          DIST_NAME="${TAG%-v*}"
          VERSION="${TAG##*-v}"
          # PyPI distribution name → packages/<dir> mapping. The cluster
          # package publishes as bare `anygarden`; the directory is still
          # packages/cluster/ so the source layout stays stable.
          case "${DIST_NAME}" in
            anygarden)         PKG="cluster" ;;
            anygarden-machine) PKG="machine" ;;
            anygarden-agent)   PKG="agent" ;;
            *)
              echo "::error::Unknown tag prefix: ${DIST_NAME}"
              exit 1
              ;;
          esac
          echo "dist_name=${DIST_NAME}" >> "$GITHUB_OUTPUT"
          echo "package=${PKG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Tag: ${TAG} -> dist=${DIST_NAME}, package=${PKG}, version=${VERSION}"

      - name: Verify pyproject version matches tag
        working-directory: packages/${{ steps.parse.outputs.package }}
        run: |
          PYPROJECT_VERSION=$(grep -E '^version = ' pyproject.toml | head -n1 | sed -E 's/version = "([^"]+)".*/\1/')
          if [ "$PYPROJECT_VERSION" != "${{ steps.parse.outputs.version }}" ]; then
            echo "::error::Tag version ${{ steps.parse.outputs.version }} does not match pyproject.toml version ${PYPROJECT_VERSION}"
            exit 1
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Build sdist + wheel
        run: |
          rm -rf dist/
          # uv writes workspace-member artifacts to the workspace root
          # `dist/` regardless of cwd, so run from repo root and select
          # by distribution name.
          uv build --package "${{ steps.parse.outputs.dist_name }}"

      - name: Resolve previous tag for same package
        id: prev
        run: |
          DIST_NAME="${{ steps.parse.outputs.dist_name }}"
          CURRENT="${GITHUB_REF_NAME}"
          PREV=$(git tag --list "${DIST_NAME}-v*" --sort=-version:refname \
            | grep -vx "${CURRENT}" \
            | head -n1 || true)
          echo "tag=${PREV}" >> "$GITHUB_OUTPUT"
          if [ -n "${PREV}" ]; then
            echo "Previous ${DIST_NAME} tag: ${PREV}"
          else
            echo "No previous ${DIST_NAME} tag found - this is the first release for the package."
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DIST_NAME="${{ steps.parse.outputs.dist_name }}"
          VERSION="${{ steps.parse.outputs.version }}"
          PREV_TAG="${{ steps.prev.outputs.tag }}"
          # uv normalizes hyphens to underscores in wheel/sdist
          # filenames (PEP 491/625), so anygarden-machine ships as
          # anygarden_machine-<ver>-*.whl. Translate the distribution
          # name to the filename form before globbing.
          FILE_PREFIX="${DIST_NAME//-/_}"
          ARGS=(
            "${GITHUB_REF_NAME}"
            --title "${DIST_NAME} v${VERSION}"
            --generate-notes
          )
          if [ -n "${PREV_TAG}" ]; then
            ARGS+=(--notes-start-tag "${PREV_TAG}")
          fi
          gh release create "${ARGS[@]}" dist/${FILE_PREFIX}-${VERSION}*
