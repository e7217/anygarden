name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-linux:
    name: Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync workspace
        run: uv sync --all-packages --all-extras

      - name: Lint
        run: uv run ruff check packages/

      - name: Test machine
        working-directory: packages/machine
        run: uv run pytest -x

      - name: Test agent
        working-directory: packages/agent
        run: uv run pytest -x

      - name: Test cluster
        working-directory: packages/cluster
        run: uv run pytest -x

  test-windows:
    name: Test (Windows native)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync workspace
        run: uv sync --all-packages --all-extras

      # Windows scope is intentionally narrow for now: machine + agent
      # cover the safefs Windows backend, proc_kill, and gemini_cli
      # subprocess group handling. Cluster backend tests use POSIX
      # paths heavily and are validated on Linux; once the Windows
      # backend is stable they can be added here too.
      - name: Test machine (safefs Windows backend)
        working-directory: packages/machine
        run: uv run pytest -x

      - name: Test agent
        working-directory: packages/agent
        run: uv run pytest -x

  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: packages/cluster/frontend/package-lock.json

      - name: Install
        working-directory: packages/cluster/frontend
        run: npm ci

      - name: Build (typecheck + bundle)
        working-directory: packages/cluster/frontend
        run: npm run build
