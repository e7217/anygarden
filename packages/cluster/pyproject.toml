[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "anygarden"
version = "0.8.1"
description = "Lightweight multi-agent chat server"
authors = [{ name = "Changyong Um" }]
license = "Apache-2.0"
readme = "README.md"
requires-python = ">=3.11"

dependencies = [
    "fastapi>=0.110,<0.120",
    "uvicorn[standard]>=0.29",
    "sqlalchemy[asyncio]>=2.0,<2.1",
    "aiosqlite>=0.19",
    "pydantic>=2.6,<3.0",
    "pydantic-settings>=2.2",
    "python-jose[cryptography]>=3.3",
    "python-multipart>=0.0.9",
    "argon2-cffi>=23.1",
    "structlog>=24.1",
    "prometheus-client>=0.20",
    "alembic>=1.13",
    "click>=8.1",
    # #124 — MCP server template catalog. Fernet (symmetric encryption)
    # for credential at-rest; tomli-w for codex ``.codex/config.toml``
    # merging (tomllib is stdlib-read-only). Both were previously only
    # available transitively via python-jose; pin them directly so the
    # mcp_templates package has an explicit dependency contract.
    "cryptography>=42",
    "tomli-w>=1.0",
    # #197 — LiteLLM gateway config.yaml rendering. Was previously
    # available only transitively via anygarden-machine; pinned directly
    # now that llm_gateway/config_writer.py consumes it.
    "pyyaml>=6.0",
    # #302 — cron parsing for the autonomous responsibility scheduler
    # (``goals.policy.compute_next_run_at``). Tiny (~3KB) and predates
    # APScheduler; picked because the MVP scheduler is a single-instance
    # polling loop and doesn't need a persistent jobstore.
    "croniter>=2.0",
    # #397 — runtime dependency, NOT dev-only. The server imports
    # ``anygarden_machine.safefs.secure_chmod`` at module load
    # (app.py, llm_gateway/bootstrap.py), so a published wheel must
    # carry it as a hard requirement. ``[tool.uv.sources]`` below keeps
    # local development on the sibling workspace path, but that source
    # pin does not leak into the wheel's ``Requires-Dist`` — hence the
    # explicit ``>=0.8`` constraint so ``pip install anygarden`` resolves
    # it from PyPI. server/machine ship lockstep, so the floor is safe.
    "anygarden-machine>=0.8",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "httpx>=0.27",
    "ruff>=0.3",
    "mypy>=1.9",
]

[project.scripts]
anygarden-server = "anygarden.cli:main"

# #398 — the built SPA lives in ``anygarden/static/`` but that path is
# git-ignored (it is a vite build artifact, never committed). hatchling
# skips VCS-ignored files by default, so without this the published
# distributions ship zero static assets and ``GET /`` 404s. ``artifacts``
# force-includes the on-disk build output into BOTH the sdist and the
# wheel — this matters because ``uv build`` builds the wheel *from the
# sdist*, so a wheel-only ``force-include`` fails ("Forced include not
# found") when the sdist already dropped the assets. The release
# pipeline must run ``npm run build`` before ``uv build``.
[tool.hatch.build]
artifacts = ["anygarden/static/**"]

[tool.hatch.build.targets.wheel]
packages = ["anygarden"]

[tool.uv.sources]
anygarden-machine = { workspace = true }

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
# Slow tests (E2E against real external subprocesses like codex CLI)
# are registered here and excluded from the default run. Opt in with
# ``uv run pytest -m slow`` when you want to exercise the full stack.
markers = [
    "slow: end-to-end tests that shell out to real external binaries (codex, claude, gemini); skipped by default",
]
addopts = "-m 'not slow'"
