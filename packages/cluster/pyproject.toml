[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "anygarden"
version = "0.7.1"
description = "Lightweight multi-agent chat server"
authors = [{ name = "Changyong Um" }]
license = "Apache-2.0"
readme = "README.md"
requires-python = ">=3.11"

dependencies = [
    "fastapi>=0.110,<0.120",
    "uvicorn[standard]>=0.29",
    "sqlalchemy[asyncio]>=2.0,<2.1",
    "aiosqlite>=0.19",
    "pydantic>=2.6,<3.0",
    "pydantic-settings>=2.2",
    "python-jose[cryptography]>=3.3",
    "python-multipart>=0.0.9",
    "argon2-cffi>=23.1",
    "structlog>=24.1",
    "prometheus-client>=0.20",
    "alembic>=1.13",
    "click>=8.1",
    # #124 — MCP server template catalog. Fernet (symmetric encryption)
    # for credential at-rest; tomli-w for codex ``.codex/config.toml``
    # merging (tomllib is stdlib-read-only). Both were previously only
    # available transitively via python-jose; pin them directly so the
    # mcp_templates package has an explicit dependency contract.
    "cryptography>=42",
    "tomli-w>=1.0",
    # #197 — LiteLLM gateway config.yaml rendering. Was previously
    # available only transitively via anygarden-machine; pinned directly
    # now that llm_gateway/config_writer.py consumes it.
    "pyyaml>=6.0",
    # #302 — cron parsing for the autonomous responsibility scheduler
    # (``goals.policy.compute_next_run_at``). Tiny (~3KB) and predates
    # APScheduler; picked because the MVP scheduler is a single-instance
    # polling loop and doesn't need a persistent jobstore.
    "croniter>=2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "httpx>=0.27",
    "ruff>=0.3",
    "mypy>=1.9",
    # Required by tests/test_e2e_materialize.py — validates the
    # cross-package spawn-frame → materialize pipeline. Sourced from
    # the sibling monorepo path via [tool.uv.sources] below.
    "anygarden-machine",
]

[project.scripts]
doorae-server = "doorae.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["doorae"]

[tool.uv.sources]
anygarden-machine = { workspace = true }

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
# Slow tests (E2E against real external subprocesses like codex CLI)
# are registered here and excluded from the default run. Opt in with
# ``uv run pytest -m slow`` when you want to exercise the full stack.
markers = [
    "slow: end-to-end tests that shell out to real external binaries (codex, claude, gemini); skipped by default",
]
addopts = "-m 'not slow'"
