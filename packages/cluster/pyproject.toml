[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "doorae-cluster"
version = "0.2.0"
description = "Lightweight multi-agent chat server"
authors = [{ name = "Changyong Um" }]
license = "Apache-2.0"
readme = "README.md"
requires-python = ">=3.11"

dependencies = [
    "fastapi>=0.110,<0.120",
    "uvicorn[standard]>=0.29",
    "sqlalchemy[asyncio]>=2.0,<2.1",
    "aiosqlite>=0.19",
    "pydantic>=2.6,<3.0",
    "pydantic-settings>=2.2",
    "python-jose[cryptography]>=3.3",
    "argon2-cffi>=23.1",
    "structlog>=24.1",
    "prometheus-client>=0.20",
    "alembic>=1.13",
    "click>=8.1",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "httpx>=0.27",
    "ruff>=0.3",
    "mypy>=1.9",
    # Required by tests/test_e2e_materialize.py — validates the
    # cross-package spawn-frame → materialize pipeline. Sourced from
    # the sibling monorepo path via [tool.uv.sources] below.
    "doorae-machine",
]

[project.scripts]
doorae-server = "doorae.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["doorae"]

[tool.uv.sources]
doorae-machine = { workspace = true }

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
# Slow tests (E2E against real external subprocesses like codex CLI)
# are registered here and excluded from the default run. Opt in with
# ``uv run pytest -m slow`` when you want to exercise the full stack.
markers = [
    "slow: end-to-end tests that shell out to real external binaries (codex, claude, gemini); skipped by default",
]
addopts = "-m 'not slow'"
