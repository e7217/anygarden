[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "doorae-agent"
version = "0.1.0"
description = "Python SDK for Doorae multi-agent chat"
authors = [{ name = "Changyong Um" }]
license = "Apache-2.0"
readme = "README.md"
requires-python = ">=3.12"

dependencies = [
    "websockets>=12.0",
    "httpx>=0.27",
    "pydantic>=2.6,<3.0",
    "click>=8.1",
    "structlog>=24.1",
    "pyyaml>=6.0",
    # Engine dependencies — included by default so all engines work
    # out of the box without extra install flags.
    "codex-python>=1.114",
    "claude-agent-sdk>=0.1.0",
    "openai>=1.30",
    "anthropic>=0.25",
]

[project.optional-dependencies]
# Kept for backward compatibility (pip install doorae-agent[claude-code])
claude-code = []
gemini-cli = []
openai = []
anthropic = []
codex = []
openhands = []
deep-agents = []
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "ruff>=0.3",
    "mypy>=1.9",
    # Installed in dev so the claude-code adapter can actually run
    # end-to-end against the real SDK; tests use a fake module via
    # sys.modules so they don't depend on it being present.
    "claude-agent-sdk>=0.1.0",
]

[project.scripts]
doorae-agent = "doorae_agent.cli:agent_main"
doorae-client = "doorae_agent.cli:client_main"

[tool.hatch.build.targets.wheel]
packages = ["doorae_agent"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
