[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "anygarden-agent"
version = "0.10.0"
description = "Python SDK for Anygarden multi-agent chat"
authors = [{ name = "Changyong Um" }]
license = "Apache-2.0"
readme = "README.md"
requires-python = ">=3.12"

dependencies = [
    "websockets>=12.0",
    "httpx>=0.27",
    "pydantic>=2.6,<3.0",
    "click>=8.1",
    "structlog>=24.1",
    "pyyaml>=6.0",
    "psutil>=5.9",
    # Engine dependencies — included by default so all engines work
    # out of the box without extra install flags.
    # (#506 removed codex-python: the codex-cli engine invokes the ``codex``
    # binary directly via subprocess, so no Python SDK dependency is needed.)
    "claude-agent-sdk>=0.1.0",
    # Issue #355 Phase 0 — OpenHands V1 SDK as the in-process Python
    # adapter alternative to the three CLI engines.
    "openhands-sdk>=1.35,<2",
    # Runtime tool bundle (TerminalTool / FileEditorTool /
    # TaskTrackerTool / DelegateTool). Without these the SDK only
    # ships FinishTool + ThinkTool, so any user query that needs
    # shell or file work terminates after a single text turn — LLM
    # emits a preamble ("I'll check..."), no tool call follows, and
    # the SDK's ``_handle_content_response`` marks the conversation
    # FINISHED. The package ships these tools as a separate wheel.
    "openhands-tools>=1.35,<2",
]

[project.optional-dependencies]
# Kept for backward compatibility (pip install anygarden-agent[claude-code])
claude-code = []
gemini-cli = []
openhands = []
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "ruff>=0.3",
    "mypy>=1.9",
    # Installed in dev so the claude-code adapter can actually run
    # end-to-end against the real SDK; tests use a fake module via
    # sys.modules so they don't depend on it being present.
    "claude-agent-sdk>=0.1.0",
    # Issue #355 — same pattern for openhands-sdk in dev.
    "openhands-sdk>=1.35,<2",
    "openhands-tools>=1.35,<2",
]

[project.scripts]
anygarden-agent = "anygarden_agent.cli:agent_main"
anygarden-client = "anygarden_agent.cli:client_main"

[tool.hatch.build.targets.wheel]
packages = ["anygarden_agent"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
# libtmux (transitive via openhands-tools, installed under CI's --all-extras)
# ships a pytest plugin that applies a mark to a fixture; pytest >=8.4 turns that
# into a hard error at plugin import, killing collection before any test runs. We
# don't use its fixtures, so disable its autoload. (#439)
addopts = "-p no:libtmux"
