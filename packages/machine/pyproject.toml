[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "anygarden-machine"
version = "0.8.0"
description = "Machine daemon for Anygarden agent orchestration"
authors = [{ name = "Changyong Um" }]
license = "Apache-2.0"
readme = "README.md"
requires-python = ">=3.11"

dependencies = [
    "websockets>=12.0",
    "httpx>=0.27",
    "pydantic>=2.6,<3.0",
    "pydantic-settings>=2.2",
    "click>=8.1",
    "structlog>=24.1",
    "psutil>=5.9",
    "pyyaml>=6.0",
    "argon2-cffi>=23.1",
    # Issue #357 — in-process Python engines (currently OpenHands) are
    # detected by ``importlib.import_module`` inside the machine
    # process. Binary engines (claude-code / codex / gemini-cli) are
    # discovered via ``shutil.which`` against PATH so they need no
    # Python dep here, but the openhands path requires the SDK to be
    # importable from the machine's own venv. The agent runtime that
    # actually consumes the SDK lives in a separate uvx cache venv;
    # without this dep the machine sees ``ImportError`` and silently
    # fails to advertise the engine, hiding it from the agent-creation
    # UI even when the agent itself can run it.
    "openhands-sdk>=1.21",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "ruff>=0.3",
    "mypy>=1.9",
]

[project.scripts]
anygarden-machine = "anygarden_machine.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["anygarden_machine"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
