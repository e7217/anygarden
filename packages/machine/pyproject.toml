[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "doorae-machine"
version = "0.3.1"
description = "Machine daemon for Doorae agent orchestration"
authors = [{ name = "Changyong Um" }]
license = "Apache-2.0"
readme = "README.md"
requires-python = ">=3.11"

dependencies = [
    "websockets>=12.0",
    "httpx>=0.27",
    "pydantic>=2.6,<3.0",
    "pydantic-settings>=2.2",
    "click>=8.1",
    "structlog>=24.1",
    "psutil>=5.9",
    "pyyaml>=6.0",
    "argon2-cffi>=23.1",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "ruff>=0.3",
    "mypy>=1.9",
]

[project.scripts]
doorae-machine = "doorae_machine.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["doorae_machine"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
